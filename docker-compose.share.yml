name: tinitiate-autopost

x-share-dockerfile: &share-dockerfile |
  # syntax=docker/dockerfile:1

  FROM alpine:3.20 AS source
  WORKDIR /src
  RUN apk add --no-cache ca-certificates curl tar
  ADD https://api.github.com/repos/tintiatekaushik-spec/new_autopost/commits/main /tmp/source-version.json
  RUN curl -fsSL --retry 5 --retry-delay 5 --retry-connrefused https://github.com/tintiatekaushik-spec/new_autopost/archive/refs/heads/main.tar.gz -o /tmp/source.tar.gz \
    && tar -xzf /tmp/source.tar.gz --strip-components=1 -C /src \
    && test -f package.json \
    && test -f package-lock.json \
    && test -d server \
    && test -d src \
    && test -d shared \
    && test -d supabase/migrations

  FROM node:22-bookworm-slim AS web-build
  WORKDIR /app
  ENV VITE_BROWSER_DESKTOP_URL=auto
  COPY --from=source /src/package.json /src/package-lock.json ./
  RUN npm ci
  COPY --from=source /src ./
  RUN npm run build

  FROM nginx:1.27-alpine AS web
  COPY --from=source /src/docker/nginx.conf /etc/nginx/conf.d/default.conf
  COPY --from=web-build /app/dist /usr/share/nginx/html
  EXPOSE 80

  FROM mcr.microsoft.com/playwright:v1.61.0-noble AS api
  WORKDIR /app
  ENV NODE_ENV=production
  ENV PORT=4100
  ENV UPLOAD_DIR=/app/uploads
  ENV UPLOAD_MAX_FILE_BYTES=1073741824
  ENV CHROME_PATH=/usr/bin/google-chrome
  ENV CHROME_NO_SANDBOX=true
  ENV DISPLAY=:99
  ENV DISPLAY_RESOLUTION=1920x1080x24
  RUN apt-get update \
    && apt-get install -y --no-install-recommends \
      ca-certificates \
      curl \
      fluxbox \
      fonts-liberation \
      fonts-noto-color-emoji \
      novnc \
      websockify \
      x11vnc \
      xvfb \
    && rm -rf /var/lib/apt/lists/*
  COPY --from=source /src/package.json /src/package-lock.json ./
  RUN npm ci --omit=dev \
    && find /ms-playwright /opt /usr -type f -name chrome -exec ln -sf {} /usr/bin/google-chrome \; -quit \
    && test -x /usr/bin/google-chrome \
    && google-chrome --version
  COPY --from=source /src/server ./server
  COPY --from=source /src/shared ./shared
  COPY --from=source /src/tsconfig.json ./
  COPY --from=source /src/docker/start-api.sh /usr/local/bin/start-api.sh
  RUN mkdir -p /app/uploads /app/browser-data /app/data \
    && chmod +x /usr/local/bin/start-api.sh
  VOLUME ["/app/uploads", "/app/browser-data", "/app/data"]
  EXPOSE 4100 6080
  CMD ["/usr/local/bin/start-api.sh"]

  FROM postgres:16-alpine AS db
  COPY --from=source /src/supabase/migrations /docker-entrypoint-initdb.d

x-build-common: &build-common
  context: .
  dockerfile_inline: *share-dockerfile

services:
  db:
    build:
      <<: *build-common
      target: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-54322}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} && psql -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} -tAc \"select to_regclass('public.user_profiles')\" | grep -q user_profiles"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build:
      <<: *build-common
      target: api
    restart: unless-stopped
    init: true
    shm_size: "2gb"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4100
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATABASE: ${POSTGRES_DB:-postgres}
      DATABASE_URL: ${APP_DATABASE_URL:-}
      SUPABASE_DATABASE_URL: ${APP_SUPABASE_DATABASE_URL:-}
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_FILE_BYTES: ${UPLOAD_MAX_FILE_BYTES:-1073741824}
      CHROME_PATH: ${CHROME_PATH:-/usr/bin/google-chrome}
      CHROME_NO_SANDBOX: ${CHROME_NO_SANDBOX:-true}
      DISPLAY: ${DISPLAY:-:99}
      DISPLAY_RESOLUTION: ${DISPLAY_RESOLUTION:-1920x1080x24}
      OPERATIONS_MANAGER_USERNAME: ${OPERATIONS_MANAGER_USERNAME:-}
      OPERATIONS_MANAGER_PASSWORD: ${OPERATIONS_MANAGER_PASSWORD:-}
      OPERATIONS_MANAGER_NAME: ${OPERATIONS_MANAGER_NAME:-}
      OPERATIONS_MANAGER_EMAIL: ${OPERATIONS_MANAGER_EMAIL:-}
      POST_UPLOADER_USERNAME: ${POST_UPLOADER_USERNAME:-}
      POST_UPLOADER_PASSWORD: ${POST_UPLOADER_PASSWORD:-}
      POST_UPLOADER_NAME: ${POST_UPLOADER_NAME:-}
      POST_UPLOADER_EMAIL: ${POST_UPLOADER_EMAIL:-}
      SCHEDULER_USERNAME: ${SCHEDULER_USERNAME:-}
      SCHEDULER_PASSWORD: ${SCHEDULER_PASSWORD:-}
      SCHEDULER_NAME: ${SCHEDULER_NAME:-}
      SCHEDULER_EMAIL: ${SCHEDULER_EMAIL:-}
      VIEWER_USERNAME: ${VIEWER_USERNAME:-}
      VIEWER_PASSWORD: ${VIEWER_PASSWORD:-}
      VIEWER_NAME: ${VIEWER_NAME:-}
      VIEWER_EMAIL: ${VIEWER_EMAIL:-}
      LOCAL_ACCOUNT_SECRET_KEY: ${LOCAL_ACCOUNT_SECRET_KEY:-}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-}
      SCHEDULER_CRON: ${SCHEDULER_CRON:-* * * * *}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Asia/Kolkata}
      AUTOMATION_SLOW_MO_MS: ${AUTOMATION_SLOW_MO_MS:-120}
      AUTOMATION_FAILURE_HOLD_MS: ${AUTOMATION_FAILURE_HOLD_MS:-30000}
    ports:
      - "${API_PORT:-4100}:4100"
      - "${BROWSER_DESKTOP_PORT:-6080}:6080"
    volumes:
      - uploads:/app/uploads
      - browser_data:/app/browser-data
      - app_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6080/vnc.html >/dev/null && node -e \"fetch('http://127.0.0.1:4100/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  web:
    build:
      <<: *build-common
      target: web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5173}:80"

volumes:
  postgres_data:
  uploads:
  browser_data:
  app_data:
